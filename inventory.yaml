    openclaw_nodes:
      hosts:
        node1-sim:
          ansible_host: localhost
          ansible_port: 2221
          ansible_user: root
          ansible_password: rootpassword
          ansible_connection: ssh
          ansible_ssh_extra_args: '-o HostKeyAlgorithms=+ssh-rsa -o PubkeyAcceptedKeyTypes=+ssh-rsa -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null'
